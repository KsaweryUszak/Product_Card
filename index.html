<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Preview Card</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&family=Montserrat:wght@500;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="card">
    <picture class="card__image">
      <source media="(min-width: 768px)" srcset="./images/image-product-desktop.jpg">
      <img src="./images/image-product-mobile.jpg" alt="Gabrielle Essence Eau De Parfum">
    </picture>

    <section class="card__content">
      <p class="card__category">Perfume</p>

      <h1 class="card__title">
        Gabrielle Essence Eau De Parfum
      </h1>

      <p class="card__description">
        A floral, solar and voluptuous interpretation composed by
        Olivier Polge, Perfumer-Creator for the House of CHANEL.
      </p>

      <div class="card__prices">
        <span class="price price--current">$149.99</span>
        <span class="price price--old">$169.99</span>
      </div>

      <button class="card__button">
        <img src="./images/icon-cart.svg" alt="">
        Add to Cart
      </button>
    </section>
  </main>

</body>
</html>
